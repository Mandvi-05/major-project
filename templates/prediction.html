<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GreenGuard | Solar Power Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f6f8;
        }

        header {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #27ae60;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #eafaf1;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            color: #27ae60;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>🌞 Solar Power Prediction</h1>
    <p>Enter weather parameters to predict power output</p>
</header>

<div class="container">
    <h2>Prediction Inputs</h2>

    <form method="POST" action="/prediction">

    <input type="number" step="any" name="ambient_temp" placeholder="Ambient Temperature" required>
<input type="number" step="any" name="module_temp" placeholder="Module Temperature" required>
<input type="number" step="any" name="irradiation" placeholder="Irradiation" required>
<input type="number" name="hour" placeholder="Hour (0-23)" required>
<input type="number" name="day_of_week" placeholder="Day (0-6)" required>
<input type="number" name="month" placeholder="Month (1-12)" required>
<input type="number" name="plant_id" placeholder="Plant ID" required>
    <button type="submit">Predict</button>
</form>

<h3>{{ prediction_text }}</h3>

    <a href="/home" class="back">⬅ Back to Home</a>
</div>

</body>
</html>
