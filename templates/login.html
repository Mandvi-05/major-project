<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GreenGuard | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            font-family:'Poppins', sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            position:relative;
            background:
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
            url('https://images.unsplash.com/photo-1509391366360-2e959784a276?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
        }

        /* ANIMATED CIRCLES */

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.08);
            animation:float 6s infinite ease-in-out;
        }

        .circle1{
            width:220px;
            height:220px;
            top:-60px;
            left:-60px;
        }

        .circle2{
            width:180px;
            height:180px;
            bottom:-50px;
            right:-50px;
            animation-delay:2s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        /* LOGIN CONTAINER */

        .login-container{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        /* GLASS LOGIN BOX */

        .login-box{

            width:400px;
            padding:45px;
            border-radius:30px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.2);

            box-shadow:0 10px 40px rgba(0,0,0,0.25);

            color:white;

            animation:fadeUp 1s ease;
        }

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0px);
            }

        }

        .logo{
            text-align:center;
            margin-bottom:10px;
        }

        .logo h1{
            font-size:34px;
            color:#7dff9b;
        }

        .logo p{
            color:#f1f1f1;
            font-size:14px;
            margin-top:8px;
        }

        /* INPUT BOX */

        .input-group{
            margin-top:25px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            color:#f1f1f1;
        }

        .input-box{
            position:relative;
        }

        .input-box i{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#888;
        }

        .input-box input{
            width:100%;
            padding:14px 14px 14px 45px;
            border:none;
            outline:none;
            border-radius:14px;
            background:rgba(255,255,255,0.92);
            font-size:15px;
            transition:0.3s;
        }

        .input-box input:focus{
            transform:scale(1.02);
            box-shadow:0 0 10px rgba(125,255,155,0.5);
        }

        /* LOGIN BUTTON */

        .login-btn{
            width:100%;
            margin-top:30px;
            padding:14px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#2ecc71,#27ae60);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-4px);
            box-shadow:0 10px 20px rgba(46,204,113,0.35);
        }

        /* EXTRA OPTIONS */

        .options{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:15px;
            font-size:13px;
            color:#eee;
        }

        .options a{
            color:#7dff9b;
            text-decoration:none;
        }

        .options a:hover{
            text-decoration:underline;
        }

        /* SIGNUP */

        .signup{
            text-align:center;
            margin-top:25px;
            font-size:14px;
            color:#eee;
        }

        .signup a{
            color:#7dff9b;
            text-decoration:none;
            font-weight:600;
        }

        .signup a:hover{
            text-decoration:underline;
        }

        /* RESPONSIVE */

        @media(max-width:500px){

            .login-box{
                width:100%;
                padding:35px 25px;
            }

            .logo h1{
                font-size:28px;
            }

        }

    </style>

</head>

<body>

    <!-- BACKGROUND CIRCLES -->

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <!-- LOGIN SECTION -->

    <div class="login-container">

        <div class="login-box">

            <div class="logo">

                <h1>🌞 GreenGuard</h1>

                <p>
                    Smart Solar Power Prediction System
                </p>

            </div>

            <!-- FORM -->

            <form action="/login" method="POST">

    <!-- EMAIL -->

    <div class="input-group">

        <label>Email Address</label>

        <div class="input-box">

            <i class="fa-solid fa-envelope"></i>

            <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

        </div>

    </div>

    <!-- PASSWORD -->

    <div class="input-group">

        <label>Password</label>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required>

        </div>

    </div>

    <!-- OPTIONS -->

    <div class="options">

        <label>
            <input type="checkbox">
            Remember me
        </label>

        <a href="#">Forgot Password?</a>

    </div>

    <!-- BUTTON -->

    <button type="submit" class="login-btn">

        <i class="fa-solid fa-right-to-bracket"></i>

        Login

    </button>

</form>

            <!-- SIGNUP -->

            <div class="signup">

                Don't have an account?

                <a href="/signup">Create Account</a>

            </div>

        </div>

    </div>

</body>
</html>
