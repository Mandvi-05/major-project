<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GreenGuard | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #fff;
            width: 360px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            color: #27ae60;
            margin-bottom: 10px;
        }

        .login-box p {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-box {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-box label {
            font-size: 13px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #27ae60;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #219150;
        }

        .signup-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .signup-link a {
            text-decoration: none;
            color: #27ae60;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🌞 GreenGuard</h2>
    <p>Login to access solar prediction system</p>

    <form action="/home" method="get">
    <div class="input-box">
        <label>Email</label>
        <input type="email" name="email" required>
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" name="password" required>
    </div>

    <button type="submit" class="login-btn">Login</button>
</form>

<div class="signup-link">
    Don't have an account? <a href="/signup">Sign Up</a>
</div>
</body>
</html>
